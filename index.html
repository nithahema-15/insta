        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        .story-ring {
            padding: 3px;
            border-radius: 50%;
            background: linear-gradient(45deg, #FCAF45, #F77737, #E1306C);
        }
        
        .story-ring-viewed {
            padding: 3px;
            border-radius: 50%;
            background: #D1D5DB;
        }
        
        .gradient-btn {
            background: linear-gradient(90deg, #F77737, #E1306C);
        }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
        
        .video-progress { height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .video-progress-bar { height: 100%; background: white; transition: width 0.1s linear; }
        
        @keyframes pulse-live {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .animate-pulse-live { animation: pulse-live 1.5s ease-in-out infinite; }
        
        .aspect-9-16 { aspect-ratio: 9 / 16; }
        .aspect-4-5 { aspect-ratio: 4 / 5; }
        
        /* Sound wave animation */
        @keyframes soundWave {
            0%, 100% { height: 3px; }
            50% { height: 15px; }
        }
        
        .sound-bar {
            width: 3px;
            background: #E1306C;
            border-radius: 2px;
            animation: soundWave 0.5s ease-in-out infinite;
        }
        
        .sound-bar:nth-child(2) { animation-delay: 0.1s; }
        .sound-bar:nth-child(3) { animation-delay: 0.2s; }
        .sound-bar:nth-child(4) { animation-delay: 0.3s; }
        
        /* Playing indicator */
        .playing-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Live badge */
        .live-badge {
            background: linear-gradient(45deg, #ff0000, #ff6b6b);
            animation: livePulse 2s infinite;
        }
        
        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
            50% { box-shadow: 0 0 0 8px rgba(255,0,0,0); }
        }
    </style>

                if (isHovered && videoRef.current && story.videoUrl && !story.isUser) {

                    }).catch(err => {

                        setIsPlaying(false);
                    });

                    videoRef.current.pause();
                    videoRef.current.currentTime = 0;
                    setIsPlaying(false);
                }

            const [isPaused, setIsPaused] = useState(false);

                if (videoRef.current) {
                    videoRef.current.volume = volume;
                    videoRef.current.play().catch(() => {});
                }
            }, [story, volume]);

                if (videoRef.current && !isPaused) {
                    interval = setInterval(() => {
                        const prog = (videoRef.current.currentTime / videoRef.current.duration) * 100;
                        setProgress(prog || 0);
                    }, 100);
                }
                return () => clearInterval(interval);
            }, [isPaused]);

            const handleVideoEnd = () => {

            };

                if (videoRef.current) {

                        videoRef.current.play();
                    } else {
                        videoRef.current.pause();
                    }
                    setIsPaused(!isPaused);
                }

                if (videoRef.current) {
                    videoRef.current.volume = newVol;
                }
            };

                            </svg>
                        </button>

                            </div>
                        </div>

                        {/* Header */}

                                <div>

                                        {item.icon === "clapperboard" && <><path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Z"/><path d="m6.2 5.3 3.1 3.9"/><path d="m12.4 3.4 3.1 4"/><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></>}
                                        {item.icon === "settings" && <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>}
                                    </svg>
                                    <span>{item.label}</span>
                                </a>
                            ))}
                            <a href="#" className="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-colors mt-4">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>
                                </svg>
                                <span>Logout</span>
                            </a>
                        </nav>
                    </div>

                    {/* Mobile Bottom Nav */}
                    <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around py-3 px-4 z-40">
                        <a href="#" className="text-gray-900">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                            </svg>
                        </a>
                        <a href="#" className="text-gray-600">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                <circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
                            </svg>
                        </a>
                        <a href="#" className="text-gray-600">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                <path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Z"/><path d="m6.2 5.3 3.1 3.9"/><path d="m12.4 3.4 3.1 4"/><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/>
                            </svg>
                        </a>
                        <a href="#" className="text-gray-600">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </a>
                    </div>
                </div>
            );
        };

        // Main App
        const App = () => {
            const [activeStory, setActiveStory] = useState(null);
            const [activeHighlight, setActiveHighlight] = useState(null);
            const [currentStoryIndex, setCurrentStoryIndex] = useState(0);

            const handleStoryClick = (story) => {
                const index = stories.findIndex(s => s.id === story.id);
                setCurrentStoryIndex(index);
                setActiveStory(story);
            };

            const handleNextStory = () => {
                if (currentStoryIndex < stories.length - 1) {
                    const nextIndex = currentStoryIndex + 1;
                    setCurrentStoryIndex(nextIndex);
                    setActiveStory(stories[nextIndex]);
                } else {
                    setActiveStory(null);
                }
            };

            const handlePrevStory = () => {
                if (currentStoryIndex > 0) {
                    const prevIndex = currentStoryIndex - 1;
                    setCurrentStoryIndex(prevIndex);
                    setActiveStory(stories[prevIndex]);
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 pb-20 lg:pb-0">
                    <div className="lg:ml-80">
                        {/* Desktop Header */}
                        <header className="hidden lg:flex items-center justify-between px-8 py-4 bg-white sticky top-0 z-30 border-b border-gray-100">
                            <div className="flex-1 max-w-md">
                                <div className="relative">
                                    <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                                    </svg>
                                    <input type="text" placeholder="Search" className="w-full pl-10 pr-4 py-2.5 bg-gray-100 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-gray-200" />
                                </div>
                            </div>
                            
                            <div className="flex items-center space-x-4">
                                <button className="relative p-2 text-gray-700 hover:bg-gray-100 rounded-full">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
                                    </svg>
                                    <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
                                </button>
                                <button className="p-2 text-gray-700 hover:bg-gray-100 rounded-full">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                        <path d="m6 9 6 6 6-6"/>
                                    </svg>
                                </button>
                                <button className="flex items-center space-x-2 gradient-btn text-white px-5 py-2.5 rounded-full font-medium hover:opacity-90 shadow-lg">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                        <circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/>
                                    </svg>
                                    <span>Create a post</span>
                                </button>
                            </div>
                        </header>

                        {/* Main Content */}
                        <main className="px-4 lg:px-8 py-4 lg:py-6 max-w-7xl mx-auto">
                            <Stories onStoryClick={handleStoryClick} />
                            <Feed />
                        </main>
                    </div>

                    {/* Scrollable Sidebar */}
                    <Sidebar onHighlightClick={setActiveHighlight} />

                    {/* Fullscreen Story Modal with FULL SOUND */}
                    {activeStory && (
                        <StoryModal 
                            story={activeStory}
                            onClose={() => setActiveStory(null)}
                            onNext={handleNextStory}
                            onPrev={handlePrevStory}
                            hasNext={currentStoryIndex < stories.length - 1}
                            hasPrev={currentStoryIndex > 0}
                        />
                    )}

                    {/* Highlight Modal with FULL SOUND */}
                    {activeHighlight && (
                        <HighlightModal 
                            highlight={activeHighlight}
                            onClose={() => setActiveHighlight(null)}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
